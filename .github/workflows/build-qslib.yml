name: Build QSLib

on:
  workflow_dispatch:


jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
    
    - name: Install Android NDK
      run: |
        # 安装必要的工具
        sudo apt-get update
        sudo apt-get install -y wget unzip
        
        # 下载 Android NDK
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        
        # 设置环境变量
        echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV
        echo "$(pwd)/android-ndk-r25c" >> $GITHUB_PATH
        
        # 验证 NDK 安装
        echo "NDK installed at: $(pwd)/android-ndk-r25c"
    
    - name: Setup Rust Android target
      run: |
        rustup target add aarch64-linux-android
        
        # 验证工具链
        rustc --print target-list | grep android || echo "Android targets not listed"
    
    - name: Create Android linker configuration
      run: |
        # 创建 cargo 配置文件
        mkdir -p .cargo
        
        cat > .cargo/config.toml << EOF
        [target.aarch64-linux-android]
        ar = "${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        linker = "${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
        
        [build]
        target = "aarch64-linux-android"
        EOF
        
        echo "Cargo config created:"
        cat .cargo/config.toml
    
    - name: Build qslib
      run: |
        # 设置环境变量
        export ANDROID_NDK_HOME="${{ env.ANDROID_NDK_HOME }}"
        export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
        
        # 验证链接器存在
        if [ -f "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" ]; then
          echo "Android linker found"
        else
          echo "Android linker not found!"
          ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep android
        fi
        
        # 显示编译信息
        echo "Building for target: aarch64-linux-android"
        echo "Binary name: qslib"
        echo "Cargo version: $(cargo --version)"
        echo "Rust version: $(rustc --version)"
        
        # 编译项目
        echo "Starting build..."
        cargo build --release --verbose
        
        # 检查输出文件
        echo "Checking for output files..."
        if [ -f "target/aarch64-linux-android/release/qslib" ]; then
          echo "✅ Success! Binary created: target/aarch64-linux-android/release/qslib"
          ls -lh "target/aarch64-linux-android/release/qslib"
          
          # 检查文件类型
          file "target/aarch64-linux-android/release/qslib"
          
          # 如果需要，创建平台特定的副本
          cp "target/aarch64-linux-android/release/qslib" \
             "target/aarch64-linux-android/release/qslib-android-aarch64"
        else
          echo "❌ Binary not found at expected location"
          echo "Looking in target directory:"
          find target/ -name "qslib" -type f 2>/dev/null || echo "No files found"
          echo "Listing release directory:"
          ls -la "target/aarch64-linux-android/release/" 2>/dev/null || echo "Directory not found"
        fi

    - name: Upload binary
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: qslib-android-aarch64
        path: |
          target/aarch64-linux-android/release/qslib-android-aarch64
          target/release/qslib
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build qslib
      run: |
        
        # 显示编译信息
        echo "Building for target: Linux x86_64"
        echo "Binary name: qslib"
        echo "Cargo version: $(cargo --version)"
        echo "Rust version: $(rustc --version)"
        
        # 编译项目
        echo "Starting build..."
        cargo build --release --verbose
        
        # 检查输出文件
        echo "Checking for output files..."
        if [ -f "target/release/qslib" ]; then
          echo "✅ Success! Binary created: target/release/qslib"
          ls -lh "target/release/qslib"
          
          # 检查文件类型
          file "target/release/qslib"
        else
          echo "❌ Binary not found at expected location"
          echo "Looking in target directory:"
          find target/ -name "qslib" -type f 2>/dev/null || echo "No files found"
          echo "Listing release directory:"
          ls -la "target/release/" 2>/dev/null || echo "Directory not found"
        fi

    - name: Upload binary
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: qslib-linux-x86_64
        path: target/release/qslib
        if-no-files-found: error
  
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Install Rust Toolchains
      uses: dtolnay/rust-toolchain@stable

    - name: Build qslib
      shell: pwsh
      run: |
        cargo build --release

    - name: Upload binary
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: qslib-windows
        path: target/release/qslib.exe